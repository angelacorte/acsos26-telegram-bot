name: Refresh conference data

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: '3.13'

      - name: Refresh conference data
        run: python scripts/refresh_conference_data.py

      - name: Check generated data
        run: python -m json.tool src/main/resources/acsos26/conference.json > /dev/null

      - name: Commit changes
        run: |
          if git diff --quiet -- src/main/resources/acsos26/conference.json; then
            echo "Conference data is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/resources/acsos26/conference.json
          git commit -m "chore: refresh conference data"
          git push
