services:
  bot:
    build: .
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_USERNAME: acsos_26_bot
      BOT_ACCESS_KEY: ${BOT_ACCESS_KEY:-}
      LLM_API_URL: http://llm:8000/ask
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      llm:
        condition: service_started
    restart: unless-stopped

  llm:
    build:
      context: .
      dockerfile: llm_service/Dockerfile
    environment:
      CONFERENCE_DATA: /app/conference.json
      DEEPAGENTS_MODEL: ${DEEPAGENTS_MODEL:-ollama:gpt-oss:20b}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.31.1
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:0.31.1
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss:20b}
    volumes:
      - ollama:/root/.ollama
    depends_on:
      ollama:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until ollama list >/dev/null 2>&1; do
          echo "Waiting for Ollama...";
          sleep 2;
        done;
        ollama pull "${OLLAMA_MODEL:-gpt-oss:20b}"
    restart: "no"

volumes:
  ollama:
