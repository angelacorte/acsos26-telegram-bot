services:
  bot:
    build: .
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_USERNAME: acsos_26_bot
      BOT_ACCESS_KEY: ${BOT_ACCESS_KEY:-}
      LLM_API_URL: http://llm:8000/ask
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      llm:
        condition: service_started
    restart: unless-stopped

  llm:
    build:
      context: .
      dockerfile: llm_service/Dockerfile
    environment:
      CONFERENCE_DATA: /app/conference.json
      DEEPAGENTS_MODEL: ${DEEPAGENTS_MODEL:-ollama:gpt-oss:20b}
      LLM_FAILURE_COOLDOWN_SECONDS: ${LLM_FAILURE_COOLDOWN_SECONDS:-600}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_BASE_URL: http://ollama:11434
      ACSOS_BASE_URL: ${ACSOS_BASE_URL:-https://2026.acsos.org}
      ACSOS_LIVE_SEARCH_ENABLED: ${ACSOS_LIVE_SEARCH_ENABLED:-true}
      ACSOS_MAX_SEARCH_RESULTS: ${ACSOS_MAX_SEARCH_RESULTS:-5}
      ACSOS_MAX_PAGES_PER_QUERY: ${ACSOS_MAX_PAGES_PER_QUERY:-3}
      ACSOS_MAX_LIVE_TOOL_CALLS: ${ACSOS_MAX_LIVE_TOOL_CALLS:-2}
      ACSOS_CACHE_TTL_DYNAMIC_SECONDS: ${ACSOS_CACHE_TTL_DYNAMIC_SECONDS:-900}
      ACSOS_CACHE_TTL_STANDARD_SECONDS: ${ACSOS_CACHE_TTL_STANDARD_SECONDS:-21600}
      ACSOS_CACHE_TTL_STATIC_SECONDS: ${ACSOS_CACHE_TTL_STATIC_SECONDS:-86400}
      ACSOS_CONNECT_TIMEOUT_SECONDS: ${ACSOS_CONNECT_TIMEOUT_SECONDS:-3}
      ACSOS_READ_TIMEOUT_SECONDS: ${ACSOS_READ_TIMEOUT_SECONDS:-7}
      ACSOS_OVERALL_TIMEOUT_SECONDS: ${ACSOS_OVERALL_TIMEOUT_SECONDS:-10}
      ACSOS_USER_AGENT: ${ACSOS_USER_AGENT:-acsos26-telegram-bot/1.0 (+https://2026.acsos.org)}
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.31.1
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:0.31.1
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss:20b}
    volumes:
      - ollama:/root/.ollama
    depends_on:
      ollama:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until ollama list >/dev/null 2>&1; do
          echo "Waiting for Ollama...";
          sleep 2;
        done;
        ollama pull "${OLLAMA_MODEL:-gpt-oss:20b}"
    restart: "no"

volumes:
  ollama:
